<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Sonshine Room Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>
<body>

<header th:fragment="header">
    <nav class="navbar navbar-expand-md navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand fw-semibold" th:href="@{/}">Sonshine Room Food Pantry</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/}">Home</a>
                <a class="nav-link" th:href="@{/admin}">Admin</a>
                <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/admin/users/register}">Register User</a>
            </div>
        </div>
    </nav>
</header>

<footer th:fragment="footer">
    <footer class="bg-light border-top mt-5 py-3">
        <div class="container text-muted small text-center">
            &copy; Owen Jacobs 2026. <p th:text="${#dates.year(date)}"></p>
        </div>
    </footer>
</footer>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Sonshine Room Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>
<body>

<header th:fragment="header">
    <nav class="navbar navbar-expand-md navbar-dark bg-primary mb-4 fixed-top">
        <div class="container">
            <a class="navbar-brand fw-semibold" th:href="@{/}">Sonshine Room Food Pantry</a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarMain"
                    aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" th:href="@{/}">Home</a>
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                    <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/admin/users/register}">Register User</a>
                    <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/admin#add-category}">Add Category</a>
                    <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/admin#add-item}">Add Item</a>
                </div>
            </div>
        </div>
    </nav>
</header>

<footer th:fragment="footer">
    <footer class="bg-light border-top mt-5 py-3">
        <div class="container text-muted small text-center">
            &copy; Owen Jacobs 2026
        </div>
    </footer>
</footer>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</th:block>

</body>
</html>

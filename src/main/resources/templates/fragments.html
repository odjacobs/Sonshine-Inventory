<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Sonshine Room Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <style>
        .navbar-spacer {
            height: 4.5rem;
        }
    </style>
</head>
<body>

<header th:fragment="header">
    <nav class="navbar navbar-expand-md navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand fw-semibold" th:href="@{/}">Sonshine Room Food Pantry</a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarMain"
                    aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" th:href="@{/}">Home</a>
                    <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/admin/dashboard}">Dashboard</a>
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                    <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/logout}">Log out</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="navbar-spacer" aria-hidden="true"></div>
</header>

<footer th:fragment="footer">
    <footer class="bg-light border-top mt-5 py-3">
        <div class="container text-muted small text-center">
            &copy; Owen Jacobs 2026
        </div>
    </footer>
</footer>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <script>
        // Initialize ScrollSpy globally when a fixed-top navbar with id #navbarMain exists.
        // We measure the navbar height to set the offset so active links are correct.
        document.addEventListener('DOMContentLoaded', function () {
            try {
                var navbar = document.getElementById('navbarMain');
                if (!navbar) return;
                // Determine offset based on actual navbar height (include margins)
                var navEl = navbar.closest('.navbar');
                var offset = 72; // fallback
                if (navEl) {
                    var rect = navEl.getBoundingClientRect();
                    offset = Math.round(rect.height) || offset;
                }

                // Initialize ScrollSpy on body with the computed offset
                var existing = bootstrap.ScrollSpy.getInstance(document.body);
                if (!existing) {
                    new bootstrap.ScrollSpy(document.body, { target: '#navbarMain', offset: offset });
                } else {
                    existing._config.target = '#navbarMain';
                    existing._config.offset = offset;
                    existing.refresh();
                }
            } catch (e) {
                // Fail silently in environments without bootstrap
                console.warn('Global ScrollSpy init failed', e);
            }

            // Also set active navbar link based on current pathname when there's no in-page hash.
            // This ensures pages like /, /admin, /admin/users/register highlight correctly.
            try {
                var navLinks = document.querySelectorAll('#navbarMain .nav-link');
                function normalizePath(p) {
                    if (!p) return '/';
                    return p.replace(/\/+$/, '') || '/';
                }

                function setActiveByPath() {
                    var currentPath = normalizePath(window.location.pathname);
                    var currentHash = window.location.hash || '';
                    // If there's an in-page hash, prefer ScrollSpy; don't override
                    if (currentHash) return;
                    var matched = false;
                    navLinks.forEach(function (link) {
                        try {
                            var url = new URL(link.href, window.location.origin);
                            var linkPath = normalizePath(url.pathname);
                            if (!matched && linkPath === currentPath) {
                                navLinks.forEach(function (l) { l.classList.remove('active'); });
                                link.classList.add('active');
                                matched = true;
                            }
                        } catch (e) {
                            // ignore malformed
                        }
                    });
                }

                setActiveByPath();
                // Update on navigation events
                window.addEventListener('popstate', setActiveByPath);
                window.addEventListener('hashchange', setActiveByPath);
            } catch (e) {
                console.warn('Path-based nav active init failed', e);
            }
        });
    </script>
</th:block>

</body>
</html>

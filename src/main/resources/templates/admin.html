<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Admin - Sonshine Inventory')}"></head>
<body class="bg-light">

<header th:replace="~{fragments :: header}"></header>

<main class="container">
    <h1 class="mb-4">Admin</h1>

    <div class="card mb-5">
        <div class="card-header">
            <h2 class="h5 mb-0">Categories</h2>
        </div>
        <div class="card-body">
            <table class="table table-bordered table-striped table-hover align-middle mb-4">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Display Order</th>
                        <th>Active</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cat : ${categories}">
                        <td th:text="${cat.id}"></td>
                        <td th:text="${cat.name}"></td>
                        <td th:text="${cat.displayOrder}"></td>
                        <td th:text="${cat.active}"></td>
                    </tr>
                </tbody>
            </table>

            <h3 class="h6 fw-semibold mb-3">Add Category</h3>
            <form th:action="@{/admin/categories}" method="post" class="row g-2 align-items-end">
                <div class="col-auto">
                    <label class="form-label" for="catName">Name</label>
                    <input id="catName" type="text" name="name" class="form-control" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Add Category</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card mb-5">
        <div class="card-header">
            <h2 class="h5 mb-0">Items</h2>
        </div>
        <div class="card-body">
            <table class="table table-bordered table-striped table-hover align-middle mb-4">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Category</th>
                        <th>Name</th>
                        <th>Unit</th>
                        <th>In Stock</th>
                        <th>Quota</th>
                        <th>Active</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.id}"></td>
                        <td th:text="${categoryNames[item.categoryId]}"></td>
                        <td th:text="${item.name}"></td>
                        <td th:text="${item.unitLabel}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="${item.quota}"></td>
                        <td th:text="${item.active}"></td>
                    </tr>
                </tbody>
            </table>

            <h3 class="h6 fw-semibold mb-3">Add Item</h3>
            <form th:action="@{/admin/items}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label" for="itemCategory">Category</label>
                    <select id="itemCategory" name="categoryId" class="form-select" required>
                        <option value="">-- Select --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="itemName">Name</label>
                    <input id="itemName" type="text" name="name" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="itemUnit">Unit Label</label>
                    <input id="itemUnit" type="text" name="unitLabel" class="form-control" placeholder="e.g. cans, lbs">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="itemQty">Initial Quantity</label>
                    <input id="itemQty" type="number" name="quantity" class="form-control" value="0" min="0" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="itemQuota">Quota</label>
                    <input id="itemQuota" type="number" name="quota" class="form-control" min="0">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Add Item</button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>

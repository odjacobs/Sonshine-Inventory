<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Admin - Sonshine Inventory')}"></head>
<body class="bg-light">

<header th:replace="~{fragments :: header}"></header>

<main class="container pb-5">
    <h1 class="mb-4">Admin</h1>

    <!-- Editable save form -->
    <form id="admin-form" th:action="@{/admin/save}" method="post">

        <!-- Categories -->
        <div id="categories" class="card mb-4">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                    <h2 class="h5 mb-0">Categories</h2>
                    <div class="d-flex gap-2 align-items-center">
                        <button type="button" id="toggle-inactive-categories-btn" class="btn btn-sm btn-outline-secondary">Show inactive</button>
                        <span class="text-muted small">Drag to reorder on desktop, or use Up/Down.</span>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="row g-3 category-list">
                    <div class="col-12 category-card" th:each="cat, stat : ${categories}" draggable="true" th:classappend="${!cat.active} ? 'category-inactive'">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body">
                                <input type="hidden"
                                       th:name="|categories[${stat.index}].id|"
                                       th:value="${cat.id}">
                                <input type="hidden"
                                       class="category-order-input"
                                       th:name="|categories[${stat.index}].displayOrder|"
                                       th:value="${cat.displayOrder}">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <div>
                                        <div class="text-muted small">Display Order</div>
                                        <div class="fw-semibold category-order-label" th:text="${cat.displayOrder}"></div>
                                    </div>
                                    <div class="btn-group" role="group" aria-label="Reorder category">
                                        <button type="button" class="btn btn-outline-secondary btn-sm category-move-up">Up</button>
                                        <button type="button" class="btn btn-outline-secondary btn-sm category-move-down">Down</button>
                                    </div>
                                </div>
                                <div class="row g-3 align-items-end">
                                    <div class="col-12 col-md-8">
                                        <label class="form-label">Name</label>
                                        <input type="text"
                                               class="form-control"
                                               th:name="|categories[${stat.index}].name|"
                                               th:value="${cat.name}"
                                               required>
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <label class="form-label d-block">Active</label>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" role="switch"
                                                   th:name="|categories[${stat.index}].active|"
                                                   value="true"
                                                   th:checked="${cat.active}">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Category -->
        <div id="add-category" class="card mb-5" style="scroll-margin-top: 6rem;">
            <div class="card-header">
                <h2 class="h5 mb-0">Add Category</h2>
            </div>
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-12 col-sm-auto">
                        <label class="form-label" for="catName">Name</label>
                        <input id="catName" type="text" name="name" class="form-control" required
                               form="add-category-form">
                    </div>
                    <div class="col-12 col-sm-auto">
                        <button type="submit" class="btn btn-primary w-100" form="add-category-form">Add Category</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Items -->
        <div id="items" class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h2 class="h5 mb-0">Items</h2>
                <div class="d-flex gap-2 align-items-center">
                    <button type="button" id="toggle-inactive-btn" class="btn btn-sm btn-outline-secondary">Show inactive</button>
                    <a th:href="@{/admin/export/inventory.csv}" class="btn btn-sm btn-outline-secondary">Export CSV</a>
                </div>
            </div>
            <div class="card-body">
                <div class="row g-3" id="items-list">
                    <div class="col-12 item-row" th:each="item, stat : ${items}" th:classappend="${!item.active} ? 'item-inactive'">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body">
                                <input type="hidden"
                                       th:name="|items[${stat.index}].id|"
                                       th:value="${item.id}">
                                <div class="row g-3">
                                    <div class="col-12 col-lg-4">
                                        <label class="form-label">Category</label>
                                        <select class="form-select"
                                                th:name="|items[${stat.index}].categoryId|"
                                                required>
                                            <option th:each="cat : ${categories}"
                                                    th:value="${cat.id}"
                                                    th:text="${cat.name}"
                                                    th:selected="${cat.id == item.categoryId}"></option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-lg-4">
                                        <label class="form-label">Name</label>
                                        <input type="text"
                                               class="form-control"
                                               th:name="|items[${stat.index}].name|"
                                               th:value="${item.name}"
                                               required>
                                    </div>
                                    <div class="col-12 col-lg-4">
                                        <label class="form-label">Unit Label</label>
                                        <input type="text"
                                               class="form-control"
                                               th:name="|items[${stat.index}].unitLabel|"
                                               th:value="${item.unitLabel}"
                                               placeholder="e.g. cans, lbs">
                                    </div>
                                    <div class="col-6 col-lg-2">
                                        <label class="form-label">In Stock</label>
                                        <input type="number"
                                               class="form-control"
                                               th:name="|items[${stat.index}].quantity|"
                                               th:value="${item.quantity}"
                                               min="0" required>
                                    </div>
                                    <div class="col-6 col-lg-2">
                                        <label class="form-label">Quota</label>
                                        <input type="number"
                                               class="form-control"
                                               th:name="|items[${stat.index}].quota|"
                                               th:value="${item.quota}"
                                               min="0">
                                    </div>
                                    <div class="col-12 col-lg-2">
                                        <label class="form-label d-block">Active</label>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" role="switch"
                                                   th:name="|items[${stat.index}].active|"
                                                   value="true"
                                                   th:checked="${item.active}">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Item -->
        <div id="add-item" class="card mb-5" style="scroll-margin-top: 6rem;">
            <div class="card-header">
                <h2 class="h5 mb-0">Add Item</h2>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label" for="itemCategory">Category</label>
                        <select id="itemCategory" name="categoryId" class="form-select" required
                                form="add-item-form">
                            <option value="">-- Select --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="itemName">Name</label>
                        <input id="itemName" type="text" name="name" class="form-control" required
                               form="add-item-form">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="itemUnit">Unit Label</label>
                        <input id="itemUnit" type="text" name="unitLabel" class="form-control" placeholder="e.g. cans, lbs"
                               form="add-item-form">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label" for="itemQty">Initial Quantity</label>
                        <input id="itemQty" type="number" name="quantity" class="form-control" value="0" min="0" required
                               form="add-item-form">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label" for="itemQuota">Quota</label>
                        <input id="itemQuota" type="number" name="quota" class="form-control" min="0"
                               form="add-item-form">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary" form="add-item-form">Add Item</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Users -->
        <div id="users" class="card mb-5">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h2 class="h5 mb-0">Admin Users</h2>
                <a th:href="@{/admin/users/register}" class="btn btn-sm btn-outline-primary">Register New User</a>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-12" th:each="user, stat : ${users}">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body">
                                <input type="hidden"
                                       th:name="|users[${stat.index}].username|"
                                       th:value="${user.username}">
                                <div class="fw-semibold mb-2" th:text="${user.username}"></div>
                                <div class="row g-3 align-items-end">
                                    <div class="col-12 col-md-6">
                                        <label class="form-label">Display Name</label>
                                        <input type="text"
                                               class="form-control"
                                               th:name="|users[${stat.index}].displayName|"
                                               th:value="${user.displayName}">
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <label class="form-label">New Password</label>
                                        <input type="password"
                                               class="form-control"
                                               th:name="|users[${stat.index}].newPassword|"
                                               placeholder="Leave blank to keep unchanged"
                                               autocomplete="new-password">
                                    </div>
                                    <div class="col-12 col-md-2">
                                        <label class="form-label d-block">Enabled</label>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" role="switch"
                                                   th:name="|users[${stat.index}].enabled|"
                                                   value="true"
                                                   th:checked="${user.enabled}">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Floating save bar -->
        <div id="save-bar" style="position:fixed;bottom:1.5rem;left:1rem;right:1rem;z-index:1050;display:none;text-align:center">
            <button type="submit" class="btn btn-success btn-lg shadow-lg px-5 w-100" style="max-width:20rem">
                Save Changes
            </button>
        </div>

    </form><!-- end #admin-form -->

    <form id="add-category-form" th:action="@{/admin/categories}" method="post"></form>
    <form id="add-item-form" th:action="@{/admin/items}" method="post"></form>

    <!-- Pledges -->
    <div id="pledges" class="card mb-5">
        <div class="card-header">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <h2 class="h5 mb-0">Pledges</h2>
                <a th:href="@{/admin/export/pledges.csv}" class="btn btn-sm btn-outline-secondary">Export CSV</a>
                <ul class="nav nav-pills nav-sm mb-0 flex-wrap" id="pledges-filter-nav">
                    <li class="nav-item">
                        <a class="nav-link py-1 px-2"
                           th:classappend="${pledgeStatus == 'OPEN'} ? 'active'"
                           href="#" data-status="OPEN">Open</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link py-1 px-2"
                           th:classappend="${pledgeStatus == 'FULFILLED'} ? 'active'"
                           href="#" data-status="FULFILLED">Fulfilled</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link py-1 px-2"
                           th:classappend="${pledgeStatus == 'EXPIRED'} ? 'active'"
                           href="#" data-status="EXPIRED">Expired</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link py-1 px-2"
                           th:classappend="${pledgeStatus == 'CANCELLED'} ? 'active'"
                           href="#" data-status="CANCELLED">Cancelled</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link py-1 px-2"
                           th:classappend="${pledgeStatus == 'ALL'} ? 'active'"
                           href="#" data-status="ALL">All</a>
                    </li>
                </ul>
            </div>
        </div>
        <div class="card-body" th:fragment="pledgesCardBody">
            <div th:if="${#lists.isEmpty(pledges)}" class="text-muted fst-italic">
                No pledges found for this status.
            </div>
            <div th:unless="${#lists.isEmpty(pledges)}" class="row g-3">
                <div class="col-12" th:each="pledge : ${pledges}">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                                <div>
                                    <div class="fw-semibold" th:text="${pledge.donorName}"></div>
                                    <div class="text-muted small" th:text="${pledge.donorContact}"></div>
                                </div>
                                <span class="badge"
                                      th:classappend="${pledge.status.name() == 'OPEN'} ? 'bg-primary'
                                                   : (${pledge.status.name() == 'FULFILLED'} ? 'bg-success'
                                                   : (${pledge.status.name() == 'EXPIRED'} ? 'bg-secondary'
                                                   : 'bg-danger'))"
                                      th:text="${pledge.status}"></span>
                            </div>
                            <div class="row mt-3 g-2">
                                <div class="col-12 col-md-6">
                                    <div class="text-muted small">Item</div>
                                    <div th:text="${itemNames[pledge.itemId]}"></div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="text-muted small">Quantity</div>
                                    <div th:text="${pledge.quantity}"></div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="text-muted small">Expires</div>
                                    <div th:text="${#temporals.format(pledge.expiresAt, 'MM/dd/yy')}"></div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="text-muted small">Created</div>
                                    <div th:text="${#temporals.format(pledge.createdAt, 'MM/dd/yy')}"></div>
                                </div>
                            </div>
                            <div class="mt-3">
                                <div th:if="${pledge.status.name() == 'OPEN'}" class="d-flex flex-column flex-sm-row gap-2">
                                    <form th:action="@{'/admin/pledges/' + ${pledge.id} + '/fulfill'}" method="post">
                                        <input type="hidden" name="pledgeStatus" th:value="${pledgeStatus}">
                                        <button type="submit" class="btn btn-success btn-sm w-100 w-sm-auto">Fulfill</button>
                                    </form>
                                    <form th:action="@{'/admin/pledges/' + ${pledge.id} + '/cancel'}" method="post">
                                        <input type="hidden" name="pledgeStatus" th:value="${pledgeStatus}">
                                        <button type="submit" class="btn btn-outline-danger btn-sm w-100 w-sm-auto">Cancel</button>
                                    </form>
                                </div>
                                <span th:unless="${pledge.status.name() == 'OPEN'}"
                                      th:if="${pledge.fulfilledAt != null}"
                                      class="text-muted small"
                                      th:text="${#temporals.format(pledge.fulfilledAt, 'MM/dd/yy')} + ' fulfilled'"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


</main>

<footer th:replace="~{fragments :: footer}"></footer>

<th:block th:replace="~{fragments :: scripts}"></th:block>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('admin-form');
        const saveBar = document.getElementById('save-bar');
        const categoryList = document.querySelector('#categories .category-list');
        let draggedCard = null;

        const originals = new Map();
        form.querySelectorAll('input[name], select[name], textarea[name]').forEach(el => {
            if (el.form !== form) return;
            originals.set(el, el.type === 'checkbox' ? el.checked : el.value);
        });

        function checkDirty() {
            let dirty = false;
            originals.forEach((orig, el) => {
                if (el.disabled) return;
                if ((el.type === 'checkbox' ? el.checked : el.value) !== orig) dirty = true;
            });
            saveBar.style.display = dirty ? 'block' : 'none';
        }

        function refreshCategoryOrder() {
            if (!categoryList) return;
            const cards = Array.from(categoryList.querySelectorAll('.category-card'));
            cards.forEach((card, index) => {
                const order = index + 1;
                const input = card.querySelector('.category-order-input');
                const label = card.querySelector('.category-order-label');
                if (input) input.value = order;
                if (label) label.textContent = order;
            });
            checkDirty();
        }

        function getDragAfterElement(container, y) {
            const draggableElements = Array.from(container.querySelectorAll('.category-card:not(.dragging)'));
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset, element: child };
                }
                return closest;
            }, { offset: Number.NEGATIVE_INFINITY, element: null }).element;
        }

        if (categoryList && window.matchMedia('(pointer:fine)').matches) {
            categoryList.addEventListener('dragstart', (event) => {
                const card = event.target.closest('.category-card');
                if (!card) return;
                draggedCard = card;
                card.classList.add('dragging', 'opacity-50');
                event.dataTransfer.effectAllowed = 'move';
            });

            categoryList.addEventListener('dragend', () => {
                if (draggedCard) {
                    draggedCard.classList.remove('dragging', 'opacity-50');
                    draggedCard = null;
                    refreshCategoryOrder();
                }
            });

            categoryList.addEventListener('dragover', (event) => {
                if (!draggedCard) return;
                event.preventDefault();
                const afterElement = getDragAfterElement(categoryList, event.clientY);
                if (!afterElement) {
                    categoryList.appendChild(draggedCard);
                } else {
                    categoryList.insertBefore(draggedCard, afterElement);
                }
            });
        }

        if (categoryList) {
            categoryList.addEventListener('click', (event) => {
                const upButton = event.target.closest('.category-move-up');
                const downButton = event.target.closest('.category-move-down');
                if (!upButton && !downButton) return;
                const card = event.target.closest('.category-card');
                if (!card) return;

                if (upButton) {
                    const prev = card.previousElementSibling;
                    if (prev) categoryList.insertBefore(card, prev);
                }

                if (downButton) {
                    const next = card.nextElementSibling;
                    if (next) categoryList.insertBefore(next, card);
                }

                refreshCategoryOrder();
            });
        }

        form.addEventListener('input', checkDirty);
        form.addEventListener('change', checkDirty);

        refreshCategoryOrder();
    });
</script>

<script>
    // --- Feature 1: AJAX pledge status filter ---
    document.addEventListener('DOMContentLoaded', () => {
        const filterNav = document.getElementById('pledges-filter-nav');
        const pledgesCard = document.getElementById('pledges');
        if (!filterNav || !pledgesCard) return;

        filterNav.addEventListener('click', (event) => {
            const link = event.target.closest('a[data-status]');
            if (!link) return;
            event.preventDefault();

            const status = link.dataset.status;

            // Update active pill immediately for responsiveness
            filterNav.querySelectorAll('a[data-status]').forEach(a => a.classList.remove('active'));
            link.classList.add('active');

            fetch('/admin/pledges/fragment?pledgeStatus=' + encodeURIComponent(status), {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(response => {
                if (!response.ok) throw new Error('Filter request failed: ' + response.status);
                return response.text();
            })
            .then(html => {
                const cardBody = pledgesCard.querySelector('.card-body');
                if (cardBody) cardBody.outerHTML = html;
            })
            .catch(err => console.error('Pledge filter error:', err));
        });
    });

    // --- Inactive toggle factory ---
    function initInactiveToggle(btnId, listId, inactiveClass) {
        const toggleBtn = document.getElementById(btnId);
        const list = document.getElementById(listId);
        if (!toggleBtn || !list) return;

        const hasInactive = list.querySelector('.' + inactiveClass);
        if (!hasInactive) { toggleBtn.style.display = 'none'; return; }

        let showing = false;

        function apply() {
            list.querySelectorAll('.' + inactiveClass).forEach(row => {
                row.style.display = showing ? '' : 'none';
            });
            toggleBtn.textContent = showing ? 'Hide inactive' : 'Show inactive';
        }

        apply();
        toggleBtn.addEventListener('click', () => { showing = !showing; apply(); });
    }

    document.addEventListener('DOMContentLoaded', () => {
        initInactiveToggle('toggle-inactive-categories-btn', 'categories', 'category-inactive');
        initInactiveToggle('toggle-inactive-btn', 'items-list', 'item-inactive');
    });
</script>

</body>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Sonshine Food Pantry - Current Needs')}"></head>
<body class="bg-light">

<header th:replace="~{fragments :: header}"></header>

<main class="container pb-4">
    <h1 class="h3 mb-1">Current Needs</h1>
    <p class="text-muted mb-4">Tap an item to pledge a donation.</p>

    <div th:if="${#maps.isEmpty(itemsByCategory)}" class="alert alert-info">
        No items currently needed. Check back soon!
    </div>

    <th:block th:each="cat : ${categories}"
              th:if="${itemsByCategory[cat.id] != null and !#lists.isEmpty(itemsByCategory[cat.id])}">

        <h2 class="h6 text-uppercase text-muted fw-semibold mt-4 mb-2"
            th:text="${cat.name}"></h2>

        <div class="row g-3 mb-2">
            <div class="col-12" th:each="item : ${itemsByCategory[cat.id]}">
                <a th:href="@{/pledge(itemId=${item.id})}"
                   class="card border-0 shadow-sm text-decoration-none h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                            <div class="fw-semibold" th:text="${item.name}"></div>
                            <span class="btn btn-primary btn-lg w-100 w-sm-auto">Pledge</span>
                        </div>
                        <div class="text-muted small mt-2">
                            <span th:if="${item.unitLabel}" th:text="${item.unitLabel + ' · '}"></span>
                            <span th:text="${item.quantity} + ' in stock'"></span>
                            <span th:if="${item.quota != null}"
                                  th:text="' · need ' + ${item.quota - item.quantity > 0 ? item.quota - item.quantity : 0}"></span>
                        </div>
                        <div th:if="${item.quota != null and item.quota > 0}" class="mt-3">
                            <div class="d-flex flex-wrap gap-2 small text-muted">
                                <span th:text="'In stock: ' + ${item.quantity}"></span>
                                <span th:text="'Pledged: ' + ${pledgedByItem[item.id] != null ? pledgedByItem[item.id] : 0}"></span>
                                <span th:text="'Remaining: ' + ${remainingByItem[item.id] != null ? remainingByItem[item.id] : 0}"></span>
                            </div>
                            <div class="progress mt-2" style="height: 0.6rem;">
                                <div class="progress-bar bg-success" role="progressbar"
                                     th:style="'width:' + ${stockPctByItem[item.id]} + '%'"
                                     th:aria-valuenow="${stockPctByItem[item.id]}" aria-valuemin="0" aria-valuemax="100"></div>
                                <div class="progress-bar bg-warning" role="progressbar"
                                     th:style="'width:' + ${pledgedPctByItem[item.id]} + '%'"
                                     th:aria-valuenow="${pledgedPctByItem[item.id]}" aria-valuemin="0" aria-valuemax="100"></div>
                                <div class="progress-bar bg-secondary" role="progressbar"
                                     th:style="'width:' + ${remainingPctByItem[item.id]} + '%'"
                                     th:aria-valuenow="${remainingPctByItem[item.id]}" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

    </th:block>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>

</body>
</html>

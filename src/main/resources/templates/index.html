<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Sonshine Food Pantry - Current Inventory')}"></head>
<body class="bg-light">

<header th:replace="~{fragments :: header}"></header>

<main class="container">
    <h1 class="mb-4">Current Inventory</h1>

    <div th:if="${#lists.isEmpty(items)}" class="alert alert-info">
        No items currently in inventory.
    </div>

    <table th:unless="${#lists.isEmpty(items)}" class="table table-bordered table-striped table-hover align-middle">
        <thead class="table-primary">
            <tr>
                <th>Category</th>
                <th>Item</th>
                <th>Unit</th>
                <th>In Stock</th>
                <th>Quota</th>
                <th>Pledge</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${categoryNames[item.categoryId]}"></td>
                <td th:text="${item.name}"></td>
                <td th:text="${item.unitLabel}"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${item.quota}"></td>
                <td><a class="btn btn-success btn-sm" th:href="@{/pledge(itemId=${item.id})}">Pledge Donation</a></td>
            </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>

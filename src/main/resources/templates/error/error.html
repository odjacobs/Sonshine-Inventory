<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head th:replace="~{fragments :: head('Error — Sonshine Room')}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="display-1 fw-bold text-secondary" th:text="${status ?: ''}"></h1>
            <h2 class="mb-3">An Error Occurred</h2>
            <p class="text-muted mb-4" th:text="${error ?: 'Something went wrong. Please try again.'}">Something went wrong.</p>
            <a th:href="@{/}" class="btn btn-primary">Back to Home</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head th:replace="~{fragments :: head('Access Denied — Sonshine Room')}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="display-1 fw-bold text-primary">403</h1>
            <h2 class="mb-3">Access Denied</h2>
            <p class="text-muted mb-4">You don't have permission to view this page.</p>
            <div class="d-flex gap-2 justify-content-center">
                <a th:href="@{/login}" sec:authorize="isAnonymous()" class="btn btn-primary">Log In</a>
                <a th:href="@{/}" class="btn btn-outline-secondary">Back to Home</a>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Sonshine Food Pantry - Pledge Donation')}"></head>
<body class="bg-light">

<header th:replace="~{fragments :: header}"></header>

<main class="container pb-4" style="max-width: 600px">
    <h1 class="h3 mb-4">Pledge a Donation</h1>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h2 class="h6 text-uppercase text-muted fw-semibold mb-3">Item Details</h2>
            <dl class="row mb-0">
                <dt class="col-5 col-sm-4 text-muted fw-normal">Item</dt>
                <dd class="col-7 col-sm-8 fw-semibold mb-2" th:text="${item.name}"></dd>

                <dt class="col-5 col-sm-4 text-muted fw-normal" th:if="${item.unitLabel}">Unit</dt>
                <dd class="col-7 col-sm-8 mb-2" th:if="${item.unitLabel}" th:text="${item.unitLabel}"></dd>

                <dt class="col-5 col-sm-4 text-muted fw-normal">In Stock</dt>
                <dd class="col-7 col-sm-8 mb-2" th:text="${item.quantity}"></dd>

                <dt class="col-5 col-sm-4 text-muted fw-normal" th:if="${need != null}">Needed</dt>
                <dd class="col-7 col-sm-8 mb-0" th:if="${need != null}" th:text="${need}"></dd>
            </dl>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h6 text-uppercase text-muted fw-semibold mb-3">Your Pledge</h2>
            <form th:action="@{/pledge/save}" method="post">
                <input type="hidden" name="itemId" th:value="${item.id}">

                <div class="mb-3">
                    <label class="form-label" for="donorName">Your Name</label>
                    <input type="text" class="form-control form-control-lg" id="donorName" name="donorName"
                           placeholder="Full name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="donorContact">Email or Phone</label>
                    <input type="text" class="form-control form-control-lg" id="donorContact" name="donorContact"
                           placeholder="So we can follow up with you" required>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="itemQuantity">
                        Quantity
                        <span th:if="${item.unitLabel}" class="text-muted fw-normal"
                              th:text="|(${item.unitLabel})|"></span>
                    </label>
                    <input type="number" class="form-control form-control-lg" id="itemQuantity" name="quantity"
                           min="1" placeholder="How many?" required>
                </div>

                <button type="submit" class="btn btn-success btn-lg w-100">Pledge Donation</button>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>

</body>
</html>
